# Build APK (ký keystore cố định) + IPA (unsigned, cài qua SideStore) → đăng
# CÙNG 1 GitHub Release. Repo bật immutable releases nên phải gom đủ file rồi
# mới tạo release một phát (đã công bố là không đính thêm được).
#
# App Android có nút "Kiểm tra cập nhật" (Cài đặt) đọc release mới nhất qua API.
# iPhone: mở trang release bằng Safari → tải .ipa thẳng → SideStore cài.
#
# Phát hành bản mới:
#  1. Tăng version trong app/pubspec.yaml (vd 1.0.4+5)
#  2. git tag v1.0.4 && git push origin main v1.0.4

name: Android release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # chạy tay = chỉ test build, không tạo release

permissions:
  contents: write # tạo release

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          # ghim theo bản đang dev local — channel:stable trôi version, build lệch khó lần
          flutter-version: 3.44.4
          cache: true

      - name: Giải keystore từ secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (release, ký keystore)
        run: |
          flutter pub get
          flutter build apk --release \
            --target-platform android-arm64 \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/GacTruyen-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/app/outputs/flutter-apk/GacTruyen-*.apk

  ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          cache: true

      - name: Build iOS (no codesign) + đóng gói .ipa
        run: |
          flutter pub get
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr GacTruyen-${{ github.ref_name }}.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: app/build/ios/iphoneos/GacTruyen-*.ipa

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [apk, ipa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true # apk + ipa về cùng thư mục

      - name: Tạo GitHub Release kèm APK + IPA
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GacTruyen-*.apk
            GacTruyen-*.ipa
          generate_release_notes: true
