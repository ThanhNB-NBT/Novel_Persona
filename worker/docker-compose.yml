# Backend worker chạy nền: 2 service dùng chung 1 image.
#   crawler    — discovery + sync mục lục + tải nội dung chương gốc
#   translator — kéo hàng đợi dịch, gọi LLM, ghi bản dịch
# Bật:  docker compose up -d --build      (cần file .env cạnh đây — xem .env.example)
# Log:  docker compose logs -f
# Tắt:  docker compose down
# Log Docker giới hạn 10MB×3/service — không giới hạn là log ăn dần hết đĩa VPS.
x-common: &common
  image: novelworker
  env_file: .env
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  crawler:
    <<: *common
    build: .          # chỉ crawler build; translator tái dùng image → build 1 lần thay vì 2
    command: python -m novelworker.main crawl

  translator:
    <<: *common
    command: python -m novelworker.main translate
    depends_on:
      - crawler       # đảm bảo image đã build trước khi translator chạy
